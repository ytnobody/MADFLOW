name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  ci:
    name: CI
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch develop branch for lint diff
        run: git fetch origin develop

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: go mod tidy check
        run: |
          go mod tidy
          if ! git diff --exit-code go.mod go.sum; then
            echo "go mod tidy produced changes. Please run 'go mod tidy' and commit."
            exit 1
          fi

      - name: go fmt check
        run: |
          UNFORMATTED=$(gofmt -l .)
          if [ -n "$UNFORMATTED" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$UNFORMATTED"
            echo "Please run 'gofmt -w .' and commit."
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
          golangci-lint run --timeout=5m --new-from-rev=origin/develop

      - name: TODO check
        run: |
          TODOS=$(grep -rn "// TODO\|/\* TODO" --include="*.go" . 2>/dev/null || true)
          if [ -n "$TODOS" ]; then
            echo "TODO comments found in Go source files:"
            echo "$TODOS"
            echo "Please remove or implement all TODO items before merging."
            exit 1
          fi
          echo "No TODO comments found."

      - name: go test
        run: go test -race -timeout 120s ./...

      - name: go test with coverage
        run: |
          go test -race -timeout 120s -coverprofile=coverage.out -covermode=atomic ./...
          COVERAGE=$(go tool cover -func=coverage.out | grep total | awk '{print $3}' | tr -d '%')
          echo "Total test coverage: ${COVERAGE}%"
          THRESHOLD=60
          # Use awk for float comparison (bash cannot compare floats)
          if awk "BEGIN { exit (${COVERAGE} >= ${THRESHOLD} ? 0 : 1) }"; then
            echo "Coverage ${COVERAGE}% meets the threshold of ${THRESHOLD}%."
          else
            echo "ERROR: Coverage ${COVERAGE}% is below the threshold of ${THRESHOLD}%."
            echo "Please add tests to increase coverage."
            exit 1
          fi

      - name: govulncheck (security scan)
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

      - name: Integration tests
        continue-on-error: true
        run: |
          go test -race -timeout 180s -tags integration ./... 2>&1 | tee /tmp/integration-test.txt
          if grep -q "FAIL" /tmp/integration-test.txt; then
            echo "WARNING: Integration tests failed. See output above."
          else
            echo "Integration tests passed (or no integration tests found)."
          fi

      - name: Benchmark regression check
        if: github.event_name == 'pull_request'
        timeout-minutes: 5
        continue-on-error: true
        run: |
          set -e
          export PATH="$(go env GOPATH)/bin:$PATH"

          # Install benchstat for statistical benchmark comparison
          go install golang.org/x/perf/cmd/benchstat@latest

          # Run benchmarks on current (PR) branch
          echo "=== Running benchmarks on PR branch ==="
          timeout 120s go test -bench=. -benchmem -count=3 -timeout 120s ./... > /tmp/bench_new.txt 2>&1 || true
          cat /tmp/bench_new.txt

          # Fetch base branch tip and create an isolated worktree for comparison
          echo "=== Fetching base branch: ${{ github.base_ref }} ==="
          git fetch origin "${{ github.base_ref }}" --depth=1
          git worktree add /tmp/bench-base FETCH_HEAD

          # Run benchmarks on base branch
          echo "=== Running benchmarks on base branch ==="
          (cd /tmp/bench-base && timeout 120s go test -bench=. -benchmem -count=3 -timeout 120s ./...) > /tmp/bench_old.txt 2>&1 || true
          cat /tmp/bench_old.txt

          # Remove temporary worktree
          git worktree remove /tmp/bench-base --force

          # Compare benchmarks
          echo "=== Benchmark comparison (old=base, new=PR) ==="
          BENCHSTAT_OUT=$(benchstat /tmp/bench_old.txt /tmp/bench_new.txt 2>&1)
          echo "$BENCHSTAT_OUT"

          # Fail if any benchmark regressed by 30% or more
          if echo "$BENCHSTAT_OUT" | awk '
            /\+[0-9]/ {
              for (i = 1; i <= NF; i++) {
                if ($i ~ /^\+[0-9]+(\.[0-9]+)?%$/) {
                  val = $i
                  gsub(/[+%]/, "", val)
                  if (val + 0 >= 30.0) {
                    print "REGRESSION: " $0
                    found = 1
                  }
                }
              }
            }
            END { exit (found ? 1 : 0) }
          '; then
            echo "Benchmark check passed: No regression >= 30% detected."
          else
            echo "ERROR: Performance regression of 30% or more detected!"
            exit 1
          fi
