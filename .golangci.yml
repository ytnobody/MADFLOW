version: "2"

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - unused
    - ineffassign
    - modernize

  settings:
    errcheck:
      # Exclude functions where intentional error ignoring is acceptable.
      # fmt.Fprintf and similar I/O functions on stdout/stderr are allowed.
      exclude-functions:
        - fmt.Fprintf
        - fmt.Fprintln
        - fmt.Fprint
        - (io.Writer).Write

issues:
  # Exclude generated files from lint.
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*_generated\\.go$"

  # Maximum number of issues to display.
  max-issues-per-linter: 50
  max-same-issues: 10
